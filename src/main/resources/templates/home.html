<!DOCTYPE html>
<html lang="en" xmlns:th="http://w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl shadow-2xl overflow-hidden">

        <!-- Card Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-indigo-500 px-8 py-6">
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center flex-shrink-0">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-indigo-200 text-xs font-medium uppercase tracking-widest">Dashboard</p>
                    <h1 class="text-white text-xl font-bold mt-0.5">Profil Saya</h1>
                </div>
            </div>
        </div>

        <!-- Card Body -->
        <div class="px-8 py-6 space-y-4">

            <!-- Username -->
            <div class="bg-slate-900/50 rounded-xl px-5 py-4 border border-slate-700/40">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-widest mb-1">Username</p>
                <p class="text-white font-semibold text-base" th:text="${user.username}">—</p>
            </div>

            <!-- Nama -->
            <div class="bg-slate-900/50 rounded-xl px-5 py-4 border border-slate-700/40">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-widest mb-1">Nama Lengkap</p>
                <p class="text-white font-semibold text-base" th:text="${profile.nama}">—</p>
            </div>

            <!-- Alamat -->
            <div class="bg-slate-900/50 rounded-xl px-5 py-4 border border-slate-700/40">
                <p class="text-xs font-medium text-slate-400 uppercase tracking-widest mb-1">Alamat</p>
                <p class="text-white font-semibold text-base" th:text="${profile.alamat}">—</p>
            </div>

        </div>

        <!-- Card Footer -->
        <div class="px-8 pb-6">
            <a th:href="@{/logout}" href="#"
               class="flex items-center justify-center gap-2 w-full
                          border border-red-500/40 text-red-400 hover:bg-red-500/10 hover:text-red-300
                          font-semibold rounded-xl py-3 text-sm
                          transition duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>
    </div>

</div>

</body>
</html>
