<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">

<!-- Card -->
<div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 shadow-lg shadow-indigo-500/30 mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Selamat Datang</h1>
        <p class="text-slate-400 text-sm mt-1">Masuk ke akun Anda</p>
    </div>

    <!-- Form Card -->
    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
        <form th:action="@{/login}" method="post" class="space-y-5">

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </span>
                    <input type="text"
                           name="username"
                           placeholder="Masukkan username"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                    <input type="password"
                           name="password"
                           placeholder="Masukkan password"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                               text-white font-semibold rounded-xl py-3 text-sm
                               shadow-lg shadow-indigo-500/25
                               transition duration-200 mt-2">
                Masuk
            </button>
        </form>
    </div>

    <!-- Register link -->
    <p class="text-center text-slate-400 text-sm mt-6">
        Belum punya akun?
        <a th:href="@{/register}" href="#"
           class="text-indigo-400 hover:text-indigo-300 font-semibold transition duration-200 ml-1">
            Register disini
        </a>
    </p>
</div>

</body>
</html>
