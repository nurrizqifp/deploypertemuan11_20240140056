<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-600 shadow-lg shadow-emerald-500/30 mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Buat Akun Baru</h1>
        <p class="text-slate-400 text-sm mt-1">Daftarkan diri Anda sekarang</p>
    </div>

    <!-- Form Card -->
    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
        <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-5">

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </span>
                    <input type="text"
                           th:field="*{username}"
                           placeholder="Masukkan username"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                    <input type="password"
                           th:field="*{password}"
                           placeholder="Buat password"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Nama -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Nama Lengkap</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </span>
                    <input type="text"
                           th:field="*{nama}"
                           placeholder="Masukkan nama lengkap"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Alamat -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Alamat</label>
                <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </span>
                    <input type="text"
                           th:field="*{alamat}"
                           placeholder="Masukkan alamat"
                           class="w-full bg-slate-900/60 border border-slate-600 text-white placeholder-slate-500
                                      rounded-xl pl-10 pr-4 py-3 text-sm
                                      focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent
                                      transition duration-200">
                </div>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700
                               text-white font-semibold rounded-xl py-3 text-sm
                               shadow-lg shadow-emerald-500/25
                               transition duration-200 mt-2">
                Daftar Sekarang
            </button>
        </form>
    </div>

    <!-- Login link -->
    <p class="text-center text-slate-400 text-sm mt-6">
        Sudah punya akun?
        <a th:href="@{/login}" href="#"
           class="text-emerald-400 hover:text-emerald-300 font-semibold transition duration-200 ml-1">
            Login disini
        </a>
    </p>
</div>

</body>
</html>
